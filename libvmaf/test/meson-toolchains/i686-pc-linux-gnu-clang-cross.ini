[binaries]
c = ['ccache', 'clang']
cpp = ['ccache', 'clang++']
ar = 'llvm-ar'
strip = 'llvm-strip'

[host_machine]
system = 'linux'
cpu_family = 'x86'
cpu = 'x86'
endian = 'little'

[built-in options]
c_args = ['-m32', '-mfpmath=sse', '-msse2']
c_link_args = ['-m32']
cpp_args = ['-m32', '-mfpmath=sse', '-msse2']
cpp_link_args = ['-m32']
