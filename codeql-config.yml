name: "VMAF CodeQL config"

disable-default-queries: false

queries:
  - uses: security-extended
  - uses: security-and-quality

paths:
  - libvmaf/src
  - libvmaf/include
  - libvmaf/tools
  - python/vmaf
  - mcp-server
  - ai/src

paths-ignore:
  - subprojects
  - build
  - builddir
  - libvmaf/test
  - python/test
  - testdata
  - "**/third_party/**"
  - "**/*.generated.*"
