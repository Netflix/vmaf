#
# dev/docker-compose.yml — VMAF fork dev-MCP stack
#
# Services:
#   dev-mcp          — libvmaf + MCP UDS server (primary container)
#   smoke-probe-cron — periodic golden-pair + MCP probe loop (every 15 min)
#
# Usage:
#   docker compose build
#   docker compose up -d
#   docker compose down
#
# See docs/development/dev-mcp.md for full operator guide.

name: vmaf-dev-mcp

# ---------------------------------------------------------------------------
# Shared extension anchor
# ---------------------------------------------------------------------------
x-common-env: &common-env
  VMAF_MODEL_PATH: /workspace/model
  VMAF_TESTDATA_PATH: /workspace/testdata
  VMAF_MCP_UDS_PATH: /sockets/vmaf-mcp.sock
  # NVIDIA GPU passthrough — NVIDIA Container Toolkit must be installed on host.
  # All NVIDIA devices are exposed; capabilities cover compute, graphics, utility,
  # and video (required for NVDEC/NVENC in FFmpeg).
  NVIDIA_VISIBLE_DEVICES: all
  NVIDIA_DRIVER_CAPABILITIES: compute,graphics,utility,video

# ---------------------------------------------------------------------------
# Volumes
# ---------------------------------------------------------------------------
volumes:
  vmaf-sockets:
    driver: local
  vmaf-probe-results:
    driver: local

# ---------------------------------------------------------------------------
# Services
# ---------------------------------------------------------------------------
services:

  # -------------------------------------------------------------------------
  # dev-mcp — primary MCP server container
  # -------------------------------------------------------------------------
  dev-mcp:
    build:
      # context is the repo root. Always invoke via dev-mcp-up.sh (which passes
      # --project-directory) or with:
      #   docker compose --project-directory <repo-root> -f dev/docker-compose.yml build
      # Without --project-directory, Docker Compose v2 defaults the project dir to
      # the compose-file's parent (dev/), which makes context: . resolve to dev/ and
      # bypasses the root .dockerignore — leaking .corpus/ (781 GB) into the build
      # context. The Containerfile now uses explicit COPY directives for each needed
      # subtree, so the build is safe even if context resolution is wrong.
      context: .
      dockerfile: dev/Containerfile
      target: dev-mcp
    image: vmaf-dev-mcp:local
    container_name: vmaf-dev-mcp
    restart: unless-stopped

    environment:
      <<: *common-env

    volumes:
      # Repo source tree — read-only at runtime (built into image)
      - type: bind
        source: .
        target: /workspace
        read_only: true
      # UDS socket directory — shared with smoke-probe-cron
      - type: volume
        source: vmaf-sockets
        target: /sockets
      # Probe results — read-write (dev-mcp writes logs here too)
      - type: bind
        source: ./.workingdir/dev-mcp-probes
        target: /probes
        read_only: false

    # NVIDIA Container Toolkit runtime — requires nvidia runtime configured on host.
    # See: https://docs.nvidia.com/datacenter/cloud-native/container-toolkit/latest/install-guide.html
    runtime: ${CONTAINER_RUNTIME:-runc}

    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

    # Intel Arc (Vulkan/SYCL via DRI) + AMD ROCm (HIP via /dev/kfd).
    # /dev/dri covers all DRM render nodes (renderD128–renderD130, cards 0–2).
    devices:
      - /dev/dri:/dev/dri
      - /dev/kfd:/dev/kfd

    # video + render groups give the HIP runtime access to /dev/kfd and
    # the DRI render nodes without running as root.
    group_add:
      - video
      - render

    # Intel Arc (Vulkan/SYCL via DRI) + AMD ROCm (HIP via /dev/kfd).
    # /dev/dri covers all DRM render nodes (renderD128–renderD130, cards 0–2).
    devices:
      - /dev/dri:/dev/dri
      - /dev/kfd:/dev/kfd

    # video + render groups give the HIP runtime access to /dev/kfd and
    # the DRI render nodes without running as root.
    # GIDs are read at compose-up time from environment variables so the
    # numeric IDs match the host's actual video/render groups (which differ
    # across distributions). Defaults are common Ubuntu values (44=video,
    # 109=render). Override via:
    #   HOST_GID_VIDEO=$(getent group video | cut -d: -f3) \
    #   HOST_GID_RENDER=$(getent group render | cut -d: -f3) \
    #   docker compose ... up -d
    group_add:
      - "${HOST_GID_VIDEO:-44}"
      - "${HOST_GID_RENDER:-109}"

    networks:
      - vmaf-net

    healthcheck:
      test: ["CMD", "test", "-S", "/sockets/vmaf-mcp.sock"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

  # -------------------------------------------------------------------------
  # smoke-probe-cron — periodic backend + MCP probe
  # -------------------------------------------------------------------------
  smoke-probe-cron:
    image: vmaf-dev-mcp:local
    container_name: vmaf-smoke-probe-cron
    restart: unless-stopped
    depends_on:
      dev-mcp:
        condition: service_healthy

    command: ["/workspace/dev/scripts/smoke-probe-loop.sh"]

    environment:
      <<: *common-env
      PROBE_INTERVAL_SECONDS: "900"  # 15 minutes
      PROBE_OUTPUT_DIR: /probes

    volumes:
      - type: bind
        source: .
        target: /workspace
        read_only: true
      - type: volume
        source: vmaf-sockets
        target: /sockets
      - type: bind
        source: ./.workingdir/dev-mcp-probes
        target: /probes
        read_only: false

    runtime: ${CONTAINER_RUNTIME:-runc}

    devices:
      - /dev/dri:/dev/dri
      - /dev/kfd:/dev/kfd

    group_add:
      - "${HOST_GID_VIDEO:-44}"
      - "${HOST_GID_RENDER:-109}"

    networks:
      - vmaf-net

# ---------------------------------------------------------------------------
# Networks
# ---------------------------------------------------------------------------
networks:
  vmaf-net:
    driver: bridge
